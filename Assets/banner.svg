<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#111128"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.08"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.05"/>
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="300" cy="200" rx="250" ry="150" fill="#6366f1" opacity="0.06" filter="url(#blur1)"/>
  <ellipse cx="900" cy="200" rx="250" ry="150" fill="#8b5cf6" opacity="0.06" filter="url(#blur1)"/>
  <ellipse cx="600" cy="350" rx="300" ry="100" fill="#4f46e5" opacity="0.04" filter="url(#blur1)"/>

  <!-- Horizontal glow line -->
  <rect x="0" y="196" width="1200" height="8" fill="url(#glow)" opacity="0.5"/>

  <!-- Sound wave lines (decorative) -->
  <g opacity="0.4">
    <!-- Wave group left -->
    <path d="M 80 160 Q 120 130, 160 160 Q 200 190, 240 160 Q 280 130, 320 160" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
    <path d="M 80 180 Q 130 140, 180 180 Q 230 220, 280 180 Q 330 140, 380 180" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.25"/>
    <path d="M 60 200 Q 120 160, 180 200 Q 240 240, 300 200 Q 360 160, 420 200" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
    <path d="M 80 220 Q 130 260, 180 220 Q 230 180, 280 220 Q 330 260, 380 220" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.25"/>
    <path d="M 80 240 Q 120 270, 160 240 Q 200 210, 240 240 Q 280 270, 320 240" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>

    <!-- Wave group right -->
    <path d="M 880 160 Q 920 130, 960 160 Q 1000 190, 1040 160 Q 1080 130, 1120 160" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
    <path d="M 820 180 Q 870 140, 920 180 Q 970 220, 1020 180 Q 1070 140, 1120 180" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.25"/>
    <path d="M 780 200 Q 840 160, 900 200 Q 960 240, 1020 200 Q 1080 160, 1140 200" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
    <path d="M 820 220 Q 870 260, 920 220 Q 970 180, 1020 220 Q 1070 260, 1120 220" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.25"/>
    <path d="M 880 240 Q 920 270, 960 240 Q 1000 210, 1040 240 Q 1080 270, 1120 240" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Vertical bar visualizer (center-left) -->
  <g opacity="0.35" transform="translate(430, 140)">
    <rect x="0" y="30" width="3" height="60" rx="1.5" fill="#818cf8"/>
    <rect x="8" y="15" width="3" height="90" rx="1.5" fill="#6366f1"/>
    <rect x="16" y="25" width="3" height="70" rx="1.5" fill="#a78bfa"/>
    <rect x="24" y="5" width="3" height="110" rx="1.5" fill="#818cf8"/>
    <rect x="32" y="20" width="3" height="80" rx="1.5" fill="#6366f1"/>
    <rect x="40" y="35" width="3" height="50" rx="1.5" fill="#a78bfa"/>
    <rect x="48" y="10" width="3" height="100" rx="1.5" fill="#818cf8"/>
  </g>

  <!-- Vertical bar visualizer (center-right) -->
  <g opacity="0.35" transform="translate(720, 140)">
    <rect x="0" y="35" width="3" height="50" rx="1.5" fill="#a78bfa"/>
    <rect x="8" y="10" width="3" height="100" rx="1.5" fill="#818cf8"/>
    <rect x="16" y="20" width="3" height="80" rx="1.5" fill="#6366f1"/>
    <rect x="24" y="5" width="3" height="110" rx="1.5" fill="#818cf8"/>
    <rect x="32" y="25" width="3" height="70" rx="1.5" fill="#a78bfa"/>
    <rect x="40" y="15" width="3" height="90" rx="1.5" fill="#6366f1"/>
    <rect x="48" y="30" width="3" height="60" rx="1.5" fill="#818cf8"/>
  </g>

  <!-- Title -->
  <text x="600" y="195" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-3" fill="url(#textGrad)" filter="url(#blur2)">Hush</text>
  <text x="600" y="195" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-3" fill="url(#textGrad)">Hush</text>

  <!-- Subtitle -->
  <text x="600" y="235" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" letter-spacing="6" fill="#94a3b8" opacity="0.8">FOCUS SOUNDS FOR iOS</text>

  <!-- Subtle dot grid -->
  <g opacity="0.08" fill="#818cf8">
    <circle cx="50" cy="50" r="1"/><circle cx="100" cy="50" r="1"/><circle cx="150" cy="50" r="1"/><circle cx="200" cy="50" r="1"/><circle cx="250" cy="50" r="1"/>
    <circle cx="950" cy="50" r="1"/><circle cx="1000" cy="50" r="1"/><circle cx="1050" cy="50" r="1"/><circle cx="1100" cy="50" r="1"/><circle cx="1150" cy="50" r="1"/>
    <circle cx="50" cy="350" r="1"/><circle cx="100" cy="350" r="1"/><circle cx="150" cy="350" r="1"/><circle cx="200" cy="350" r="1"/><circle cx="250" cy="350" r="1"/>
    <circle cx="950" cy="350" r="1"/><circle cx="1000" cy="350" r="1"/><circle cx="1050" cy="350" r="1"/><circle cx="1100" cy="350" r="1"/><circle cx="1150" cy="350" r="1"/>
  </g>

  <!-- Top & bottom border lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="399" x2="1200" y2="399" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
</svg>
