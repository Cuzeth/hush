name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app
        2. Select preset X
        3. ...
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. iPhone 16 Pro"
    validations:
      required: true
  - type: input
    id: ios-version
    attributes:
      label: iOS Version
      placeholder: "e.g. 18.4"
    validations:
      required: true
  - type: dropdown
    id: audio-output
    attributes:
      label: Audio Output
      options:
        - Built-in speaker
        - Wired headphones
        - AirPods / Bluetooth
        - Other
    validations:
      required: true
