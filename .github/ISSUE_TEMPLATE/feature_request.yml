name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature or improvement
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why?
      placeholder: How would this help your workflow?
